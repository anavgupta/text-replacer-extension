<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Replacer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-row">
        <div class="header-left">
          <h1>Text Replacer</h1>
          <p class="subtitle" id="countLabel">0 replacements</p>
        </div>
        <div class="header-right">
          <label class="global-toggle" title="Enable/Disable all replacements">
            <input type="checkbox" id="globalToggle" checked>
            <span class="toggle-slider"></span>
          </label>
          <button class="btn btn-primary btn-add" id="addReplacementBtn" title="Add New">Add</button>
        </div>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search replacements...">
      </div>
    </header>

    <div class="replacements-container">
      <table class="replacements-table" id="replacementsTable">
        <thead>
          <tr>
            <th class="col-toggle">On</th>
            <th class="col-find">Find</th>
            <th class="col-replace">Replace</th>
            <th class="col-scope">Scope</th>
            <th class="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="replacementsList">
          <!-- Replacements will be dynamically added here -->
        </tbody>
      </table>
      <div class="empty-state" id="emptyState">
        <p>No replacements configured.<br>Click "Add" to create one.</p>
      </div>
      <div class="no-results" id="noResults">
        <p>No matching replacements found.</p>
      </div>
    </div>

    <div class="backup-section">
      <button class="btn-small btn-outline" id="exportJsonBtn" title="Export as JSON">Export JSON</button>
      <button class="btn-small btn-outline" id="exportCsvBtn" title="Export as CSV">Export CSV</button>
      <button class="btn-small btn-outline" id="importBtn" title="Import from file">Import</button>
      <input type="file" id="importFile" accept=".json,.csv" style="display: none;">
    </div>

    <div class="shortcut-hint" id="shortcutHint">
      <span>Tip: Press <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>R</kbd> to toggle</span>
    </div>
  </div>

  <!-- Modal for adding/editing replacements -->
  <div class="modal" id="replacementModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add New Replacement</h2>
        <button class="modal-close" id="closeModal">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Text to Replace:</label>
          <input type="text" id="textToReplace" class="text-input" placeholder="Enter text to replace">
        </div>
        <div class="form-group">
          <label>Replacement Text:</label>
          <input type="text" id="replacementText" class="text-input" placeholder="Enter replacement text">
        </div>
        <div class="form-group">
          <label>Scope (Optional):</label>
          <input type="text" id="scope" class="text-input" placeholder="e.g., example.com or leave empty">
          <small class="help-text">Leave empty to apply on all pages</small>
        </div>
        <div class="form-group form-group-inline">
          <label class="checkbox-label">
            <input type="checkbox" id="wholeWord">
            <span>Whole word only</span>
          </label>
          <small class="help-text">Match only complete words, not partial matches</small>
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
          <button class="btn btn-primary" id="saveBtn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
