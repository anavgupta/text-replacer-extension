<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReText v2.0 — Visual Test Checklist</title>
  <style>
    :root {
      --teal: #00897b;
      --cyan: #0097a7;
      --green: #43a047;
      --red: #e53935;
      --orange: #f57c00;
      --gray: #9e9e9e;
      --bg: #fafafa;
      --card-bg: #ffffff;
      --border: #e0e0e0;
      --text: #333;
      --text-muted: #777;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

    .header {
      background: linear-gradient(135deg, var(--teal), var(--cyan));
      color: white; padding: 32px 0; text-align: center;
    }
    .header h1 { font-size: 28px; margin-bottom: 4px; }
    .header p { opacity: 0.85; font-size: 14px; }

    .stats-bar {
      display: flex; justify-content: center; gap: 32px; padding: 16px;
      background: var(--card-bg); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .stat { text-align: center; }
    .stat .num { font-size: 24px; font-weight: 700; }
    .stat .label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; }
    .stat.pass .num { color: var(--green); }
    .stat.fail .num { color: var(--red); }
    .stat.skip .num { color: var(--orange); }
    .stat.todo .num { color: var(--gray); }

    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    .section { margin-bottom: 32px; }
    .section-title {
      font-size: 18px; font-weight: 600; margin-bottom: 12px;
      padding-bottom: 8px; border-bottom: 2px solid var(--teal);
      display: flex; align-items: center; gap: 8px;
    }
    .section-title .badge {
      font-size: 11px; background: var(--teal); color: white;
      padding: 2px 8px; border-radius: 10px; font-weight: 500;
    }

    .test-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px; margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .test-card.status-pass { border-left: 4px solid var(--green); }
    .test-card.status-fail { border-left: 4px solid var(--red); }
    .test-card.status-skip { border-left: 4px solid var(--orange); }

    .test-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .test-info { flex: 1; }
    .test-id { font-size: 11px; color: var(--text-muted); font-family: monospace; }
    .test-name { font-weight: 600; font-size: 14px; margin: 2px 0; }
    .test-steps { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .test-steps ol { margin-left: 18px; margin-top: 4px; }
    .test-steps li { margin-bottom: 2px; }

    .test-controls { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
    .status-btn {
      border: none; border-radius: 6px; padding: 6px 12px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      opacity: 0.4; transition: opacity 0.2s, transform 0.1s;
    }
    .status-btn:hover { opacity: 0.8; }
    .status-btn.active { opacity: 1; transform: scale(1.05); }
    .btn-pass { background: #e8f5e9; color: var(--green); }
    .btn-fail { background: #ffebee; color: var(--red); }
    .btn-skip { background: #fff3e0; color: var(--orange); }

    .notes-input {
      width: 100%; margin-top: 10px; padding: 8px 10px;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 12px; font-family: inherit; resize: vertical;
      display: none;
    }
    .test-card.status-fail .notes-input,
    .test-card.status-skip .notes-input { display: block; }

    .actions-bar {
      display: flex; gap: 12px; justify-content: center;
      margin: 32px 0; padding-top: 24px; border-top: 1px solid var(--border);
    }
    .action-btn {
      padding: 10px 24px; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; border: none; transition: 0.2s;
    }
    .btn-export { background: var(--teal); color: white; }
    .btn-export:hover { background: #00796b; }
    .btn-reset { background: #eee; color: #555; }
    .btn-reset:hover { background: #ddd; }
    .btn-copy { background: var(--cyan); color: white; }
    .btn-copy:hover { background: #00838f; }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 10px 24px; border-radius: 8px;
      font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="header">
  <h1>ReText v2.0 — Visual Test Checklist</h1>
  <p>Test each new feature in the browser. Mark pass, fail, or skip. Add notes for failures.</p>
</div>

<div class="stats-bar">
  <div class="stat todo"><div class="num" id="statTotal">0</div><div class="label">Total</div></div>
  <div class="stat pass"><div class="num" id="statPass">0</div><div class="label">Pass</div></div>
  <div class="stat fail"><div class="num" id="statFail">0</div><div class="label">Fail</div></div>
  <div class="stat skip"><div class="num" id="statSkip">0</div><div class="label">Skip</div></div>
  <div class="stat todo"><div class="num" id="statPending">0</div><div class="label">Pending</div></div>
</div>

<div class="container" id="content"></div>

<div class="actions-bar">
  <button class="action-btn btn-copy" onclick="copyResults()">Copy Summary</button>
  <button class="action-btn btn-export" onclick="exportResults()">Export JSON</button>
  <button class="action-btn btn-reset" onclick="resetAll()">Reset All</button>
</div>

<div class="toast" id="toast"></div>

<script>
const TESTS = [
  {
    section: "Branding & Identity",
    id: "brand",
    tests: [
      { id: "BR-01", name: "Extension name shows 'ReText' in browser toolbar", steps: ["Open the extensions page", "Verify the name reads 'ReText'", "Check description is updated"] },
      { id: "BR-02", name: "New teal A→B logo visible in toolbar and extensions page", steps: ["Look at the extension icon in the browser toolbar", "Verify it shows a teal rounded square with A→B arrow", "Check icon is clear at small size (16px)"] },
      { id: "BR-03", name: "Popup title shows 'ReText'", steps: ["Click the extension icon", "Verify the popup header says 'ReText'"] },
    ]
  },
  {
    section: "F12 — Skip Script/Style/Textarea Nodes",
    id: "f12",
    tests: [
      { id: "F12-01", name: "Text inside &lt;script&gt; tags is NOT replaced", steps: ["Create a rule: find 'function', replace 'FUNC'", "Visit a page with visible text 'function' AND script tags containing 'function'", "Verify only visible text is replaced, page JS still works"] },
      { id: "F12-02", name: "Text inside &lt;style&gt; tags is NOT replaced", steps: ["Create a rule: find 'color', replace 'COLOR'", "Visit a page with inline &lt;style&gt; blocks", "Verify page styling is not broken"] },
      { id: "F12-03", name: "Text inside &lt;textarea&gt; is NOT replaced", steps: ["Create a rule: find 'hello', replace 'world'", "Visit a page with a textarea containing 'hello'", "Verify textarea content is unchanged, but other 'hello' text is replaced"] },
      { id: "F12-04", name: "Text inside &lt;code&gt;/&lt;pre&gt; is NOT replaced", steps: ["Visit a page with code blocks (e.g., GitHub, docs)", "Create a replacement rule for a common word", "Verify code blocks are untouched"] },
    ]
  },
  {
    section: "F4 — Regex Mode",
    id: "f4",
    tests: [
      { id: "F4-01", name: "Regex checkbox appears in Add/Edit modal", steps: ["Click Add", "Verify 'Use regex' checkbox is visible next to 'Whole word only'"] },
      { id: "F4-02", name: "Basic regex pattern works", steps: ["Create rule: find 'E\\d{3}' (regex ON), replace 'ERR'", "Visit a page containing 'E001', 'E999'", "Verify both are replaced with 'ERR'"] },
      { id: "F4-03", name: "Regex with capture groups works", steps: ["Create rule: find '(\\w+)@(\\w+)', replace '$2/$1' (regex ON)", "Visit a page with 'user@domain'", "Verify it becomes 'domain/user'"] },
      { id: "F4-04", name: "Invalid regex shows error toast, does not save", steps: ["Create rule: find '[invalid' (regex ON), replace 'test'", "Verify an error toast appears", "Verify the rule is NOT saved"] },
      { id: "F4-05", name: "'R' badge shows in table for regex rules", steps: ["Create a regex rule", "Verify a red 'R' badge appears next to the find text in the table"] },
      { id: "F4-06", name: "Non-regex mode still escapes special characters", steps: ["Create rule: find '$50.00' (regex OFF), replace '$60.00'", "Visit a page with '$50.00'", "Verify literal '$50.00' is replaced (not regex pattern)"] },
    ]
  },
  {
    section: "F7 — Rule Groups / Folders",
    id: "f7",
    tests: [
      { id: "F7-01", name: "Group field appears in Add/Edit modal", steps: ["Click Add", "Verify 'Group (Optional)' input field is present"] },
      { id: "F7-02", name: "Group column visible in table", steps: ["Add a rule with group 'Salesforce'", "Verify 'Group' column appears in the table with the value"] },
      { id: "F7-03", name: "Ungrouped rules show dash in Group column", steps: ["Add a rule without a group", "Verify the Group column shows '—'"] },
      { id: "F7-04", name: "Group autocomplete suggests existing groups", steps: ["Add rules with groups 'Salesforce' and 'Internal'", "Click Add, start typing 'Sal' in the Group field", "Verify autocomplete dropdown suggests 'Salesforce'"] },
      { id: "F7-05", name: "Search filters by group name", steps: ["Add rules in different groups", "Type a group name in the search box", "Verify only rules in that group appear"] },
    ]
  },
  {
    section: "F10 — Context Menu 'Create Rule'",
    id: "f10",
    tests: [
      { id: "F10-01", name: "Context menu item appears when text is selected", steps: ["Select any text on a web page", "Right-click", "Verify 'Create replacement for \"...\"' appears in context menu"] },
      { id: "F10-02", name: "Clicking context menu opens popup with pre-filled text", steps: ["Select text, right-click, choose the ReText menu item", "Open the extension popup", "Verify the 'Text to Replace' field is pre-filled with selected text"] },
    ]
  },
  {
    section: "F6 — Undo Delete (Toast)",
    id: "f6",
    tests: [
      { id: "F6-01", name: "Deleting a rule shows toast with Undo button (no confirm dialog)", steps: ["Add a test rule", "Click the X (delete) button", "Verify a toast notification appears saying 'Replacement deleted' with an 'Undo' button", "Verify NO browser confirm() dialog appears"] },
      { id: "F6-02", name: "Clicking Undo restores the deleted rule", steps: ["Delete a rule", "Quickly click 'Undo' on the toast", "Verify the rule reappears in the list"] },
      { id: "F6-03", name: "Toast auto-dismisses after ~5 seconds", steps: ["Delete a rule", "Wait without clicking Undo", "Verify the toast fades away after about 5 seconds"] },
    ]
  },
  {
    section: "F2 — Storage Sync→Local Fallback",
    id: "f2",
    tests: [
      { id: "F2-01", name: "Rules persist after closing and reopening popup", steps: ["Add a rule, close popup", "Reopen popup", "Verify the rule is still there"] },
      { id: "F2-02", name: "Rules persist after browser restart", steps: ["Add rules, close browser completely", "Reopen browser and the extension popup", "Verify all rules are preserved"] },
      { id: "F2-03", name: "Extension works in Edge without Microsoft account sign-in", steps: ["(Edge only) Sign out of Microsoft account", "Reload the extension", "Verify rules still load and replacements work"] },
    ]
  },
  {
    section: "TD5 — Toast Notifications (No More alert/confirm)",
    id: "td5",
    tests: [
      { id: "TD5-01", name: "Adding a rule shows success toast", steps: ["Add a new rule", "Verify a green 'Replacement added' toast appears briefly"] },
      { id: "TD5-02", name: "Editing a rule shows success toast", steps: ["Edit an existing rule and save", "Verify a green 'Replacement updated' toast appears"] },
      { id: "TD5-03", name: "Empty form shows warning toast (not alert)", steps: ["Click Add, leave fields empty, click Save", "Verify a yellow warning toast appears (not a browser alert box)"] },
      { id: "TD5-04", name: "Export shows success toast", steps: ["Click Export JSON with rules present", "Verify a green 'Exported as JSON' toast appears"] },
      { id: "TD5-05", name: "Import invalid file shows error toast", steps: ["Click Import and select a random non-JSON/CSV file", "Verify a red error toast appears (not a browser alert)"] },
    ]
  },
  {
    section: "TD6 — Accessibility",
    id: "td6",
    tests: [
      { id: "TD6-01", name: "Tab key navigates through all interactive elements", steps: ["Open popup, press Tab repeatedly", "Verify focus moves through: global toggle → Add button → search → table rows → export/import buttons"] },
      { id: "TD6-02", name: "Focus ring visible on buttons and inputs", steps: ["Tab through elements", "Verify each focused element has a visible blue outline"] },
      { id: "TD6-03", name: "Escape key closes the modal", steps: ["Open the Add modal", "Press Escape", "Verify the modal closes"] },
      { id: "TD6-04", name: "Screen reader labels present (inspect with DevTools)", steps: ["Right-click the popup → Inspect", "Check that buttons have aria-label attributes", "Check modal has role='dialog' and aria-modal='true'"] },
    ]
  },
  {
    section: "TD7 — CSS Variables / Dark Mode",
    id: "td7",
    tests: [
      { id: "TD7-01", name: "Popup UI looks correct with consistent colors", steps: ["Open the popup", "Verify colors are consistent (teal/blue accents, white cards, gray borders)", "No mismatched hardcoded colors"] },
      { id: "TD7-02", name: "CSS variables exist in :root (inspect with DevTools)", steps: ["Inspect the popup page", "Check popup.css has :root { --color-primary, --color-bg, --color-text, etc. }", "Verify elements use var(--...) instead of hardcoded hex"] },
      { id: "TD7-03", name: "Dark mode toggle button visible in popup header", steps: ["Open the popup", "Verify a moon icon (🌙) button appears in the header near the global toggle", "Click it to enable dark mode"] },
      { id: "TD7-04", name: "Dark mode switches all colors correctly", steps: ["Click the moon icon to enable dark mode", "Verify background becomes dark, text becomes light", "Verify table, modal, buttons, and toasts all use dark colors", "Verify no broken/invisible elements"] },
      { id: "TD7-05", name: "Dark mode preference persists", steps: ["Enable dark mode, close popup", "Reopen popup", "Verify dark mode is still active"] },
      { id: "TD7-06", name: "Light mode can be restored", steps: ["In dark mode, click the sun icon (☀️)", "Verify UI returns to light theme", "Close and reopen popup — verify light mode persists"] },
    ]
  },
  {
    section: "TD3 — Dist Folder Removed",
    id: "td3",
    tests: [
      { id: "TD3-01", name: "No dist/ folder in project directory", steps: ["Check the project folder", "Verify there is no 'dist/' directory"] },
    ]
  },
  {
    section: "TD4 — Error Handling",
    id: "td4",
    tests: [
      { id: "TD4-01", name: "Extension does not crash if storage is empty", steps: ["Clear extension storage (or fresh install)", "Open popup", "Verify it loads with empty state, no console errors"] },
      { id: "TD4-02", name: "No uncaught errors in console during normal use", steps: ["Open DevTools for the popup (right-click → Inspect)", "Add, edit, delete, toggle, search, export, import", "Verify no red errors in the Console tab"] },
    ]
  },
  {
    section: "Existing Features (Regression Check)",
    id: "regression",
    tests: [
      { id: "REG-01", name: "Basic text replacement works on a web page", steps: ["Add rule: find 'hello', replace 'world'", "Visit a page with 'hello'", "Verify it's replaced with 'world'"] },
      { id: "REG-02", name: "Whole word matching works", steps: ["Add rule: find 'cat' (whole word ON), replace 'dog'", "Visit page with 'cat', 'category', 'catalog'", "Verify only standalone 'cat' is replaced"] },
      { id: "REG-03", name: "Scope filtering works", steps: ["Add rule with scope 'example.com'", "Visit example.com — verify replacement happens", "Visit other.com — verify replacement does NOT happen"] },
      { id: "REG-04", name: "Global toggle disables all replacements", steps: ["Turn off the global toggle", "Verify badge shows 'OFF'", "Visit a page — verify no replacements happen", "Turn back on — verify replacements resume"] },
      { id: "REG-05", name: "Per-rule toggle works", steps: ["Disable one rule via its checkbox", "Verify that rule no longer applies", "Verify other enabled rules still work"] },
      { id: "REG-06", name: "Search/filter narrows the list", steps: ["Add multiple rules", "Type in the search box", "Verify only matching rules are shown"] },
      { id: "REG-07", name: "Keyboard shortcut Alt+Shift+R toggles extension", steps: ["Press Alt+Shift+R", "Verify badge shows 'OFF'", "Press again — verify badge returns to count"] },
      { id: "REG-08", name: "Import JSON works", steps: ["Export rules as JSON", "Delete all rules", "Import the exported JSON", "Verify rules are restored"] },
      { id: "REG-09", name: "Import CSV works", steps: ["Export rules as CSV", "Delete all rules", "Import the exported CSV", "Verify rules are restored"] },
      { id: "REG-10", name: "Badge count updates correctly", steps: ["Add 3 enabled rules", "Verify badge shows '3'", "Disable one — verify badge shows '2'", "Turn global off — verify badge shows 'OFF'"] },
    ]
  },
];

let results = {};

function init() {
  const saved = localStorage.getItem('retext-test-results');
  if (saved) results = JSON.parse(saved);

  const container = document.getElementById('content');
  let html = '';

  TESTS.forEach(section => {
    html += `<div class="section">
      <div class="section-title">${section.section} <span class="badge">${section.tests.length} tests</span></div>`;

    section.tests.forEach(test => {
      const status = results[test.id]?.status || '';
      const notes = results[test.id]?.notes || '';
      const statusClass = status ? `status-${status}` : '';

      html += `<div class="test-card ${statusClass}" id="card-${test.id}">
        <div class="test-header">
          <div class="test-info">
            <div class="test-id">${test.id}</div>
            <div class="test-name">${test.name}</div>
            <div class="test-steps"><strong>Steps:</strong><ol>${test.steps.map(s => `<li>${s}</li>`).join('')}</ol></div>
          </div>
          <div class="test-controls">
            <button class="status-btn btn-pass ${status === 'pass' ? 'active' : ''}" onclick="setStatus('${test.id}', 'pass')">Pass</button>
            <button class="status-btn btn-fail ${status === 'fail' ? 'active' : ''}" onclick="setStatus('${test.id}', 'fail')">Fail</button>
            <button class="status-btn btn-skip ${status === 'skip' ? 'active' : ''}" onclick="setStatus('${test.id}', 'skip')">Skip</button>
          </div>
        </div>
        <textarea class="notes-input" id="notes-${test.id}" placeholder="Describe what went wrong or why skipped..." oninput="saveNotes('${test.id}')">${notes}</textarea>
      </div>`;
    });

    html += '</div>';
  });

  container.innerHTML = html;
  updateStats();
}

function setStatus(id, status) {
  const current = results[id]?.status;
  if (current === status) {
    delete results[id];
    status = '';
  } else {
    if (!results[id]) results[id] = {};
    results[id].status = status;
  }
  save();

  const card = document.getElementById(`card-${id}`);
  card.className = 'test-card' + (status ? ` status-${status}` : '');
  card.querySelectorAll('.status-btn').forEach(btn => btn.classList.remove('active'));
  if (status) {
    card.querySelector(`.btn-${status}`).classList.add('active');
  }
  updateStats();
}

function saveNotes(id) {
  const val = document.getElementById(`notes-${id}`).value;
  if (!results[id]) results[id] = {};
  results[id].notes = val;
  save();
}

function save() {
  localStorage.setItem('retext-test-results', JSON.stringify(results));
}

function updateStats() {
  let total = 0, pass = 0, fail = 0, skip = 0;
  TESTS.forEach(s => s.tests.forEach(t => {
    total++;
    const st = results[t.id]?.status;
    if (st === 'pass') pass++;
    else if (st === 'fail') fail++;
    else if (st === 'skip') skip++;
  }));
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPass').textContent = pass;
  document.getElementById('statFail').textContent = fail;
  document.getElementById('statSkip').textContent = skip;
  document.getElementById('statPending').textContent = total - pass - fail - skip;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function copyResults() {
  let lines = ['# ReText v2.0 — Visual Test Results', `Date: ${new Date().toLocaleString()}`, ''];
  TESTS.forEach(section => {
    lines.push(`## ${section.section}`);
    section.tests.forEach(test => {
      const r = results[test.id];
      const status = r?.status ? r.status.toUpperCase() : 'PENDING';
      const icon = status === 'PASS' ? '[PASS]' : status === 'FAIL' ? '[FAIL]' : status === 'SKIP' ? '[SKIP]' : '[    ]';
      lines.push(`  ${icon} ${test.id}: ${test.name}`);
      if (r?.notes) lines.push(`         Notes: ${r.notes}`);
    });
    lines.push('');
  });

  let total = 0, pass = 0, fail = 0, skip = 0;
  TESTS.forEach(s => s.tests.forEach(() => { total++; }));
  Object.values(results).forEach(r => { if (r.status === 'pass') pass++; else if (r.status === 'fail') fail++; else if (r.status === 'skip') skip++; });
  lines.push(`## Summary: ${pass}/${total} passed, ${fail} failed, ${skip} skipped, ${total - pass - fail - skip} pending`);

  navigator.clipboard.writeText(lines.join('\n')).then(() => showToast('Copied to clipboard'));
}

function exportResults() {
  const data = { date: new Date().toISOString(), results };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `retext-test-results-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Exported');
}

function resetAll() {
  if (confirm('Reset all test results?')) {
    results = {};
    localStorage.removeItem('retext-test-results');
    init();
    showToast('All results cleared');
  }
}

init();
</script>
</body>
</html>
